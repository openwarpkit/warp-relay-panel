services:
  db:
    image: postgres:17-alpine
    container_name: warp-relay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warp}
      POSTGRES_USER: ${POSTGRES_USER:-warp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warp} -d ${POSTGRES_DB:-warp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/openwarpkit/warp-relay-panel:latest
    container_name: warp-relay-panel
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-warp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-warp}
    ports:
      - "10.8.0.2:3012:8000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
