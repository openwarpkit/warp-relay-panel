<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WARP Relay — Отключите VPN</title>
<style>$style</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap icon-warn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <h2>Обнаружен WARP / VPN</h2>
  <p class="subtitle">Активация невозможна: ваш IP принадлежит подсети Cloudflare.</p>
  <div class="ip-row">
    <span class="ip-row-label">Текущий IP</span>
    <span class="ip-row-value">$ip</span>
  </div>
  <ol class="steps">
    <li>Отключите Cloudflare WARP, 1.1.1.1 или любой VPN</li>
    <li>Подключитесь через домашний Wi-Fi или мобильный интернет</li>
    <li>Нажмите кнопку ниже</li>
  </ol>
  <button class="btn" id="refreshBtn" onclick="onRefresh(this)">
    <span class="spinner"></span>
    <span class="btn-text">Проверить ещё раз</span>
  </button>
  <p class="hint">После активации WARP можно включить обратно.</p>
</div>
<script>
function onRefresh(btn) {
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('.btn-text').textContent = 'Проверяем…';
  setTimeout(function () { location.reload(); }, 500);
}
</script>
</body>
</html>
